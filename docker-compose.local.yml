services:
  ml-prediction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-prediction-service
    ports:
      - "8013:8000"  # FastAPI (lokal: 8013)
      - "8503:8501"  # Streamlit (lokal: 8503)
    environment:
      - DB_DSN=postgresql://postgres:9HVxi6hN6j7xpmqUx84o@100.118.155.75:5432/beta
      - API_PORT=8000
      - STREAMLIT_PORT=8501
      - API_BASE_URL=http://localhost:8000/api
      - TRAINING_SERVICE_API_URL=http://ml-training-service:8000/api
      - MODEL_STORAGE_PATH=/app/models
      - POLLING_INTERVAL_SECONDS=${POLLING_INTERVAL_SECONDS:-30}
      - BATCH_SIZE=${BATCH_SIZE:-50}
      - BATCH_TIMEOUT_SECONDS=${BATCH_TIMEOUT_SECONDS:-5}
      - FEATURE_HISTORY_SIZE=${FEATURE_HISTORY_SIZE:-20}
      - MAX_CONCURRENT_PREDICTIONS=${MAX_CONCURRENT_PREDICTIONS:-10}
      - MODEL_CACHE_SIZE=${MODEL_CACHE_SIZE:-10}
      - TRAINING_SERVICE_API_URL=${TRAINING_SERVICE_API_URL}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_TIMEOUT=${N8N_WEBHOOK_TIMEOUT:-5}
      - DEFAULT_ALERT_THRESHOLD=${DEFAULT_ALERT_THRESHOLD:-0.7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
    volumes:
      - ml-prediction-models:/app/models  # Persistent Volume für Modelle
      - ml-prediction-config:/app/config  # Persistent Volume für Konfiguration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - shared_network

volumes:
  ml-prediction-models:
    driver: local
  ml-prediction-config:
    driver: local

networks:
  shared_network:
    external: true
