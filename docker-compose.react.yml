# Docker Compose für React + FastAPI Setup (ohne lokale DB)
# Backend und Frontend Services - Datenbank läuft extern

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"  # Nicht nach außen exponieren, nur intern
    environment:
      # Externe Datenbank - bitte in .env oder Environment setzen
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:pass@localhost:5432/crypto}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      # Training Service für Modell-Import
      - TRAINING_SERVICE_API_URL=${TRAINING_SERVICE_API_URL:-http://localhost:8001/api}
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    networks:
      - ml-network
    restart: unless-stopped

  # React Frontend (dient als Proxy für API)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=/api  # Relative URL für API über gleichen Port
    depends_on:
      - backend
    networks:
      - ml-network
    restart: unless-stopped
    # Für Development: Volume-Mount für Hot-Reload
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules

networks:
  ml-network:
    driver: bridge

